<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>See and Do FNQ</title>
    
    <!-- TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { 
        darkMode: 'class', 
        theme: { 
          extend: { 
            colors: { 
              brand: '#0f766e', // Teal-700 (Forest Green)
              brandLight: '#2dd4bf', 
              accent: '#f97316', 
              sand: '#fdfbf7',
              slate: '#1e293b',
              darkBg: '#0f172a',
              darkCard: '#1e293b'
            }, 
            fontFamily: { sans: ['Inter', 'sans-serif'] } 
          } 
        } 
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CUSTOM STYLES -->
    <style>
        body { 
            background-color: #f0f4f8; 
            background-image: linear-gradient(to bottom, #f0f4f8, #e2e8f0);
            transition: background-color 0.3s ease;
        }
        .dark body { 
            background-color: #0f172a; 
            background-image: none;
        }
        .main-container { 
            border-radius: 12px; 
            transition: background-color 0.3s ease, color 0.3s ease;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }
        .dark .main-container {
            background: #1e293b;
            border-color: #334155;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(4px); 
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.98);
        }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        /* Falling Leaves Animation */
@keyframes fall {
  0% { transform: translateY(-10%) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
}

.falling-leaves-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 50;
  overflow: hidden;
}

.leaves-box {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  max-width: 640px;
  height: 16rem;
  border-radius: 0.5rem;
}

.leaf {
  position: absolute;
  font-size: 1rem;
  user-select: none;
  animation-timing-function: ease-in;
}

        /* Overlay Ratings */
        .rating-overlay {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.75rem;
            z-index: 20;
        }
    </style>

    <!-- SUPABASE INITIALIZATION -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const SUPABASE_URL = 'https://gvknesxtslnflmftboyb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_lhyzgEKeQ6Bip8RgO8M1zQ_CPs0A2gY';

        try {
            window.supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase Client Initialized');
        } catch (err) {
            console.error('❌ Failed to init Supabase:', err);
        }
    </script>
</head>

<body class="text-slate-800 antialiased min-h-screen flex flex-col font-sans">

    <!-- TOP BAR -->
    <header class="w-full bg-white/90 dark:bg-slate-800/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-slate-700 transition-colors shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-brand dark:text-brand-light tracking-tight flex items-center gap-2">
                <span>🌴</span> See and Do FNQ
            </h1>
            
            <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors focus:outline-none">
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 hidden text-yellow-400">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                </svg>
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-slate-600 dark:hidden">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="flex-grow main-container max-w-4xl mx-auto w-full my-6 p-4 md:p-8 glass-card relative">
        
        <!-- HEADER -->
        <header class="text-center mb-6 md:mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-brand dark:text-brand-light tracking-tight mb-2 drop-shadow-sm">See and Do FNQ</h1>
            <p class="text-lg text-slate-600 dark:text-slate-300 font-medium">Click to discover your next adventure</p>
        </header>

        <!-- RESULT AREA -->
        <div id="result-area" class="hidden animate-fade-in">
           
            <!-- ACTIVITY CARD DISPLAY -->
            <div id="content-area" class="hidden">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- EXPLORE BUTTON -->
        <button id="spinBtn" onclick="startSpin()" class="w-full bg-brand hover:bg-teal-800 text-white font-bold py-4 px-6 rounded-lg shadow-lg transform hover:scale-[1.02] transition-all duration-200 text-xl mb-8 focus:outline-none focus:ring-4 focus:ring-teal-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <span class="text-2xl">🧭</span> Explore Now
        </button>

        <!-- FILTERS SECTION -->
        <div class="border-t-2 border-slate-200 dark:border-slate-700 pt-6 mt-4">
            <div class="flex flex-wrap justify-between items-center mb-4 gap-4">
                <h3 class="text-brand dark:text-brand-light font-bold tracking-wider text-sm flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                    Customise your results
                </h3>
                
                <div class="flex items-center gap-4">
                    <label class="flex items-center cursor-pointer gap-2 text-sm font-medium text-slate-600 dark:text-slate-300">
                        <span>Hide seasonal</span>
                        <input type="checkbox" name="toggle" id="hideSeasonal" class="toggle-checkbox w-5 h-5 rounded-full appearance-none cursor-pointer border border-slate-300 checked:bg-brand checked:border-brand transition-all"/>
                    </label>
                    
                    <button onclick="resetFilters()" class="text-xs font-semibold text-slate-500 hover:text-brand dark:hover:text-brand-light underline decoration-dotted">
                        Reset filters
                    </button>
                </div>
            </div>

            <div class="filters-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
                <!-- Price -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Price</label>
                    <select id="price" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white font-medium">
                        <option value="all">Any</option>
                        <option value="$">🪙 Budget/Free</option>
                        <option value="$$">💵 Moderate</option>
                        <option value="$$$">💎 Luxury</option>
                    </select>
                </div>

                <!-- Intensity -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Intensity</label>
                    <select id="level" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all" selected>Any</option>
                        <option value="relaxed">😌 Relaxed</option>
                        <option value="active">🏃 Active</option>
                        <option value="intense">💪 Intense</option>
                    </select>
                </div>

                <!-- Style -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Activity style</label>
                    <select id="style" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all" selected>Any</option>
                        <option value="kidFriendly">👨‍👩‍👧‍👦 Kid-friendly</option>
                        <option value="romantic">❤️ Couples/romantic</option>
                    </select>
                </div>

                <!-- Distance -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Driving time</label>
                    <select id="distance" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all">Any</option>
                        <option value="Under 25mins">Under 25mins</option>
                        <option value="Under 90mins">Under 90mins</option>
                        <option value="Longer Drive">Longer drive</option>
                    </select>
                </div>

                <!-- Duration -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Duration</label>
                    <select id="duration" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all">Any</option>
                        <option value="Half Day or Less">Half day or less</option>
                        <option value="Full Day">Full day</option>
                        <option value="Multi-Day">Multi-day</option>
                    </select>
                </div>

                <!-- Weather -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Weather</label>
                    <select id="weather" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all">Any</option>
                        <option value="sun">☀️ Sunny</option>
                        <option value="rain">🌧️ Rainy</option>
                        <option value="hot">🔥 Hot</option>
                    </select>
                </div>

                <!-- Setting -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Setting</label>
                    <select id="locationType" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all" selected>Any</option>
                        <option value="outdoor">🌳 Outdoor</option>
                        <option value="indoor">🏠 Indoor</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

        <!-- GLOBAL FEEDBACK BUTTON BELOW FILTERS -->
        <div class="my-8 text-center border-t border-slate-200 dark:border-slate-700 pt-6">
            <button onclick="openFeedbackModal()" 
                    id="global-feedback-btn" 
                    class="inline-flex items-center px-6 py-3 rounded-full bg-blue-100 dark:bg-blue-900/50 text-blue-800 dark:text-blue-200 hover:bg-blue-200 dark:hover:bg-blue-800/70 transition-colors font-medium text-sm gap-2 border border-blue-200 dark:border-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
                💡 Give feedback
            </button>
        </div>

    <!-- LOADING LEAVES OVERLAY -->
<div id="loadingOverlay" class="hidden">
  <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50">
    <div class="leaves-box relative bg-white/95 dark:bg-darkCard rounded-lg shadow-xl overflow-hidden">
      <div id="fallingLeaves" class="absolute inset-0"></div>
      
      <!-- Centered Content Inside Box -->
      <div class="relative z-10 flex flex-col items-center justify-center h-full">
        <p class="text-slate-600 dark:text-slate-300 font-medium text-sm">Finding adventure...</p>
      </div>
    </div>
  </div>
</div>
    
    <!-- FEEDBACK MODAL -->
    <div id="feedbackModal" class="fixed inset-0 modal-backdrop hidden items-center justify-center z-50">
        <div class="bg-white dark:bg-slate-800 rounded-lg shadow-2xl w-full max-w-md p-6 m-4 transform transition-all scale-100 border border-slate-200 dark:border-slate-700">
            <h2 id="feedbackTitle" class="text-xl font-bold mb-4 text-slate-800 dark:text-white">Give feedback</h2>
            <div class="space-y-4">
                <!-- Radio Selection -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Feedback type</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="feedbackType" value="activity" class="w-4 h-4 text-brand focus:ring-brand" checked>
                            <span class="text-sm text-slate-700 dark:text-slate-300">This activity</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="feedbackType" value="general" class="w-4 h-4 text-brand focus:ring-brand">
                            <span class="text-sm text-slate-700 dark:text-slate-300">General issue</span>
                        </label>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Your feedback</label>
                    <textarea id="feedbackText" rows="3" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-brand outline-none" placeholder="What should we improve?"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email (optional)</label>
                    <input type="email" id="feedbackEmail" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-brand outline-none" placeholder="you@example.com">
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeFeedbackModal()" class="px-4 py-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors">Cancel</button>
                <button id="submitFeedbackBtn" class="px-4 py-2 bg-brand text-white rounded-lg hover:bg-teal-800 transition-colors">Submit</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-6 bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 font-medium text-sm flex items-center gap-2">
        Message here
    </div>

    <script src="ui-effects.js"></script>
    <script src="app.js"></script>
</body>
</html>
