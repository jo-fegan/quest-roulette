    <!-- CUSTOM STYLES -->
    <style>
        /* ROOT COLOR VARIABLES - Ensures consistency across web/mobile */
        :root {
            --bg-primary: #f0f4f8;
            --bg-secondary: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.98);
            --card-border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        .dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.98);
            --card-border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body { 
            background-color: var(--bg-primary);
            /* Rainforest Gradient Background  */
            background-image: linear-gradient(to bottom right, rgba(253, 251, 247, 0), rgba(238, 238, 245, 0.6)),
                              url('https://github.com/jo-fegan/quest-roulette/blob/82099278669e0dc34fb37ee7a89bfeb943f07196/assets/cairns_palm.jpg?raw=true');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-color 0.3s ease;
            min-height: 100vh;
            color: var(--text-primary);
        }
        
.dark body { 
    background-color: var(--bg-primary);
    /* Same gradient + image as light mode - dark mode displays background identically */
    background-image: linear-gradient(to bottom right, rgba(253, 251, 247, 0), rgba(238, 238, 245, 0.6)),
                      url('https://github.com/jo-fegan/quest-roulette/blob/82099278669e0dc34fb37ee7a89bfeb943f07196/assets/cairns_palm.jpg?raw=true');
}
        
        .main-container { 
            border-radius: 12px; 
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px -5px var(--shadow-color);
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }
        
        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(4px); 
            color: var(--text-primary);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        /* Falling Leaves Animation - UPDATED FOR CONSISTENT COLORS */
        @keyframes fallLeft {
            0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(80vh) rotate(720deg) translateX(-40px); opacity: 0; }
        }

        @keyframes fallCenter {
            0% { transform: translateY(-5vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(80vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fallRight {
            0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(80vh) rotate(720deg) translateX(40px); opacity: 0; }
        }

        .loading-leaves-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            isolation: isolate;
        }

        .falling-leaf {
            position: absolute;
            display: block;
            font-size: 1.5rem;
            user-select: none;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Overlay Ratings */
        .rating-overlay {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.75rem;
            z-index: 20;
        }

        /* Mobile/Responsive Fixes for Color Consistency */
        @media (max-width: 768px) {
            .main-container {
                margin: 0.5rem !important;
                padding: 1rem !important;
            }
            
            body {
                padding-top: 0;
                padding-bottom: 0;
            }
        }

        /* Ensure content area visible on all screen sizes */
@media (max-width: 768px) {
    #content-area {
        margin-top: 1rem !important;
    }
    
    .main-container {
        overflow-x: hidden !important;
    }
}
    </style>
