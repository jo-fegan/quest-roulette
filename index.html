<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Roulette</title>
    
    <!-- TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { 
        darkMode: 'class', 
        theme: { 
          extend: { 
            colors: { 
              brand: '#6c5ce7', 
              accent: '#fd79a8',
              darkBg: '#0f172a',
              darkCard: '#1e293b'
            }, 
            fontFamily: { sans: ['Poppins', 'sans-serif'] } 
          } 
        } 
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CUSTOM STYLES -->
    <style>
        body { 
            background-color: #f1f5f9; 
            transition: background-color 0.3s ease;
        }
        .dark body { 
            background-color: #0f172a; 
        }
        /* Ensure image area matches container padding */
        .main-container { 
            padding: 1.5rem; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .dark .main-container {
            background: #1e293b;
            border-color: #334155;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px); 
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        
        /* Modal Backdrop Blur */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>

    <!-- SUPABASE INITIALIZATION -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        const SUPABASE_URL = 'https://gvknesxtslnflmftboyb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_lhyzgEKeQ6Bip8RgO8M1zQ_CPs0A2gY';

        try {
            window.supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase Client Initialized');
        } catch (err) {
            console.error('❌ Failed to init Supabase:', err);
        }
    </script>
</head>

<body class="text-slate-800 antialiased min-h-screen flex flex-col font-sans">

    <!-- TOP BAR / HEADER -->
    <header class="w-full bg-white/80 dark:bg-slate-800/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 dark:border-slate-700 transition-colors">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-brand dark:text-white tracking-tight">🎰 Quest Roulette</h1>
            
            <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none">
                <!-- Sun Icon -->
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 hidden text-yellow-400">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                </svg>
                <!-- Moon Icon -->
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-slate-600 dark:hidden">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="flex-grow main-container max-w-4xl mx-auto w-full my-6 p-4 md:p-8 rounded-3xl shadow-lg border border-white/50 dark:border-slate-700 glass-card relative">
        
        <!-- HEADER SECTION -->
        <header class="text-center mb-6 md:mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-brand dark:text-brand-light tracking-tight mb-2 drop-shadow-sm">Find Your Next Adventure</h1>
            <p class="text-lg text-slate-600 dark:text-slate-300 font-medium">Spin the wheel and discover hidden gems!</p>
        </header>

        <!-- RESULT AREA (Hidden by default) -->
        <div id="result-area" class="hidden animate-fade-in">
            
            <!-- WHEEL SPINNER -->
            <div id="spinner" class="hidden flex-col justify-center items-center h-40 mb-6">
                <div class="absolute -top-4 z-20 text-red-500 text-3xl drop-shadow-md">▼</div>
                
                <div id="wheel-svg-container" class="relative w-48 h-48 transition-transform duration-[3000ms] ease-out">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-xl">
                        <circle cx="100" cy="100" r="95" fill="#f8fafc" stroke="#6c5ce7" stroke-width="4" />
                        <!-- Segments (Static SVG for visual) -->
                        <path d="M100,10 L100,100 L143,125 Z" fill="#e0f2fe" /><text x="100" y="50" font-size="14" fill="#6c5ce7" text-anchor="middle" font-weight="bold">A</text>
                        <path d="M143,125 L100,100 L143,75 Z" fill="#dcfce7" /><text x="155" y="115" font-size="14" fill="#16a34a" text-anchor="start" font-weight="bold">B</text>
                        <path d="M143,75 L100,100 L100,10 Z" fill="#fee2e2" /><text x="155" y="75" font-size="14" fill="#dc2626" text-anchor="start" font-weight="bold">C</text>
                        <path d="M100,10 L100,100 L57,75 Z" fill="#fef3c7" /><text x="45" y="75" font-size="14" fill="#d97706" text-anchor="end" font-weight="bold">D</text>
                        <path d="M57,75 L100,100 L100,10 Z" fill="#ede9fe" /><text x="45" y="115" font-size="14" fill="#7c3aed" text-anchor="end" font-weight="bold">E</text>
                        <path d="M57,125 L100,100 L100,10 Z" fill="#ffedd5" /><text x="10" y="115" font-size="14" fill="#ea580c" text-anchor="middle" font-weight="bold">F</text>
                        <circle cx="100" cy="100" r="25" fill="#6c5ce7" stroke="#fff" stroke-width="3" />
                        <text x="100" y="105" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">R</text>
                    </svg>
                </div>
                <p id="spin-status" class="mt-4 text-brand dark:text-brand-light font-semibold animate-pulse text-lg">Spinning...</p>
            </div>

            <!-- ACTIVITY CARD DISPLAY -->
            <div id="content-area" class="hidden">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- SPIN BUTTON -->
        <button id="spinBtn" onclick="startSpin()" class="w-full bg-gradient-to-r from-brand to-accent hover:from-indigo-700 hover:to-pink-600 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform hover:scale-[1.02] transition-all duration-200 text-xl mb-8 focus:outline-none focus:ring-4 focus:ring-purple-300 disabled:opacity-50 disabled:cursor-not-allowed">
            🎲 Spin the Wheel!
        </button>

        <!-- FILTERS SECTION -->
        <div class="border-t-2 border-slate-200 dark:border-slate-700 pt-6 mt-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-center text-brand dark:text-brand-light font-bold uppercase tracking-wider text-sm">Refine Your Search</h3>
                
                <!-- Toggle: Hide Seasonal -->
                <label class="flex items-center cursor-pointer gap-2 text-sm font-medium text-slate-600 dark:text-slate-300">
                    <span>Hide Seasonal</span>
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="hideSeasonal" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-slate-300 checked:right-0 checked:border-brand transition-all"/>
                        <label for="hideSeasonal" class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-300 cursor-pointer checked:bg-green-500"></label>
                    </div>
                </label>
            </div>

            <div class="filters-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
                <!-- Price -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Price</label>
                    <select id="price" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all">Any</option>
                        <option value="$">$ Budget (+ Free)</option>
                        <option value="$$">$$ Moderate</option>
                        <option value="$$$">$$$ Luxury</option>
                    </select>
                </div>

                <!-- Intensity -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Intensity</label>
                    <select id="level" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all" selected>Any</option>
                        <option value="relaxed">Relaxed 😌</option>
                        <option value="active">Active 🏃</option>
                        <option value="intense">Intense 💪</option>
                    </select>
                </div>

                <!-- Style (Kids/Romantic) -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Activity Style</label>
                    <select id="style" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all" selected>Any</option>
                        <option value="kidFriendly">Kid-Friendly 👨‍👩‍👧‍👦</option>
                        <option value="romantic">Couples/Romantic ❤️</option>
                    </select>
                </div>

                <!-- Distance -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Driving Distance</label>
                    <select id="distance" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all">Any</option>
                        <option value="near">Near (<25m)</option>
                        <option value="2hrs">~2 Hours</option>
                        <option value="more">Farther</option>
                    </select>
                </div>

                <!-- Duration -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Duration</label>
                    <select id="duration" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all">Any</option>
                        <option value="half day">Half Day</option>
                        <option value="full day">Full Day</option>
                        <option value="multi-day">Multi-Day</option>
                    </select>
                </div>

                <!-- Weather -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Weather</label>
                    <select id="weather" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all">Any</option>
                        <option value="sun">Sunny ☀️</option>
                        <option value="rain">Rainy 🌧️</option>
                        <option value="hot">Hot 🔥</option>
                    </select>
                </div>

                <!-- Type -->
                <div class="filter-group">
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Type</label>
                    <select id="locationType" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand outline-none dark:text-white">
                        <option value="all" selected>Any</option>
                        <option value="outdoor">Outdoor 🌳</option>
                        <option value="indoor">Indoor 🏠</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- FEEDBACK MODAL -->
    <div id="feedbackModal" class="fixed inset-0 modal-backdrop hidden items-center justify-center z-50">
        <div class="bg-white dark:bg-darkCard rounded-xl shadow-2xl w-full max-w-md p-6 m-4 transform transition-all scale-100">
            <h2 id="feedbackTitle" class="text-xl font-bold mb-4 text-slate-800 dark:text-white">Suggest an Edit</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Your Feedback</label>
                    <textarea id="feedbackText" rows="3" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-brand outline-none" placeholder="Tell us what to improve..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email (Optional)</label>
                    <input type="email" id="feedbackEmail" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 dark:text-white focus:ring-2 focus:ring-brand outline-none" placeholder="you@example.com">
                    <p class="text-xs text-slate-400 mt-1">We'll contact you if action is needed.</p>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeFeedbackModal()" class="px-4 py-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors">Cancel</button>
                <button id="submitFeedbackBtn" class="px-4 py-2 bg-brand text-white rounded-lg hover:bg-indigo-700 transition-colors">Submit</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-6 py-3 rounded-lg shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 font-medium">
        Message here
    </div>

    <script src="script.js"></script>
</body>
</html>
