<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quest Roulette - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { brand: '#6c5ce7' } }, fontFamily: { sans: ['Poppins'] } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <h1 class="text-3xl font-bold text-brand text-center mb-2">Admin Access</h1>
        <p class="text-center text-slate-500 mb-6">Sign in to manage Quests</p>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand outline-none">
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-brand to-purple-600 text-white font-bold py-3 rounded-lg hover:shadow-lg transition-all">
                Sign In
            </button>
        </form>
        <p id="errorMsg" class="text-red-500 text-sm text-center mt-4 hidden"></p>
        <div class="mt-4 text-center">
            <a href="../index.html" class="text-sm text-slate-400 hover:text-slate-600">← Back to Public Site</a>
        </div>
    </div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    
    const SUPABASE_URL = 'https://gvknesxtslnflmftboyb.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_lhyzgEKeQ6Bip8RgO8M1zQ_CPs0A2gY';
    
    window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerText = 'Signing in...';
        errorMsg.classList.add('hidden');

        try {
            // 1. Sign In
            const { data: authData, error: authError } = await window.supabase.auth.signInWithPassword({ email, password });
            
            if (authError) throw authError;
            if (!authData.session) throw new Error("No session created");

            // 2. Check Role
            // Using .limit(1).maybeSingle() to avoid errors if no row found, though we expect one.
            const { data: profile, error: profileError } = await window.supabase
                .from('profiles')
                .select('role')
                .eq('id', authData.session.user.id)
                .limit(1)
                .single(); // Returns null if not found, throws if >1

            console.log("Profile check result:", profile, profileError); // Debug log

            if (profileError) {
                // Log the error details to console for debugging
                console.error("DB Profile Error:", profileError);
                throw new Error("Database connection issue: " + profileError.message);
            }

            if (!profile || !profile.role || profile.role !== 'admin') {
                throw new Error("Access Denied: You are not an admin.");
            }

            // Success
            window.location.href = 'dashboard.html';

        } catch (err) {
            console.error("Login failed:", err);
            errorMsg.textContent = err.message;
            errorMsg.classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = 'Sign In';
        }
    });
</script>
</body>
</html>
