<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script>
      tailwind.config = { 
        darkMode: 'class', // Enable manual class toggling
        theme: { 
          extend: { 
            colors: { brand: '#6c5ce7' }, 
            fontFamily: { sans: ['Poppins'] } 
          } 
        } 
      }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- 1. Load Supabase & Initialize Admin Logic -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        
        // Create the client and assign to global window
        window.supabase = createClient('https://gvknesxtslnflmftboyb.supabase.co', 'sb_publishable_lhyzgEKeQ6Bip8RgO8M1zQ_CPs0A2gY');
        console.log("✓ Supabase Client Initialized in Module");

        // Now inject admin.js. It will detect window.supabase and start itself.
        const script = document.createElement('script');
        script.src = './admin.js'; // Relative to dashboard.html
        document.head.appendChild(script);
    </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans" >

    <!-- Header now with darkmode -->
<header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10 dark:bg-slate-800 dark:border-slate-700">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-brand dark:text-white">Quest Manager</h1>
        <div class="flex gap-4 items-center">
            <!-- Dark Mode Toggle -->
            <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                <!-- Sun Icon (shown in dark mode) -->
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden text-yellow-400">

                </svg>
                <!-- Moon Icon (shown in light mode) -->
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-600 dark:hidden">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                </svg>
            </button>
            
            <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 font-medium">Log Out</button>
        </div>
    </div>
</header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Controls Bar -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex-grow max-w-md">
                <input type="text" id="searchInput" placeholder="Search titles, areas..." 
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand outline-none"
                       oninput="renderTable()">
            </div>
            <div class="flex gap-2">
                <button onclick="openBulkEditModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    ✏️ Bulk Edit Selected
                </button>
                <button onclick="refreshData()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-100 text-slate-600 text-xs uppercase font-semibold">
                    <tr>
                        <th class="px-4 py-3 w-10"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                        <th class="px-4 py-3">Title</th>
                        <th class="px-4 py-3">Area</th>
                        <th class="px-4 py-3">Price</th>
                        <th class="px-4 py-3">Details</th>
                        <th class="px-4 py-3 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="activityTableBody" class="divide-y divide-slate-100 text-sm">
                    <!-- Rows injected by JS -->
                    <tr><td colspan="6" class="px-4 py-8 text-center text-slate-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Edit Modal (Single & Bulk) -->
    <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 m-4">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 text-slate-800">Edit Activity</h2>
            <div id="modalContent" class="space-y-4">
                <!-- Dynamic Form Fields -->
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">Cancel</button>
                <button onclick="saveChanges()" id="saveBtn" class="px-4 py-2 bg-brand text-white rounded-lg hover:bg-indigo-700">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 m-4 text-center">
            <h2 class="text-xl font-bold mb-2 text-red-600">Delete Activity?</h2>
            <p class="text-slate-600 mb-6">This action cannot be undone.</p>
            <div class="flex justify-center gap-4">
                <button onclick="document.getElementById('deleteModal').classList.add('hidden')" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">Cancel</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Yes, Delete</button>
            </div>
        </div>
    </div>

<script>
    // Theme (Dark mode) Toggling Logic
    const themeToggleBtn = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    function applyTheme(isDark) {
        if (isDark) {
            htmlElement.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
        } else {
            htmlElement.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
        }
    }

    // Initialize Theme
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        applyTheme(true);
    } else {
        applyTheme(false);
    }

    // Toggle Event Listener
    themeToggleBtn.addEventListener('click', () => {
        const isDark = htmlElement.classList.contains('dark');
        applyTheme(!isDark);
    });
</script>
