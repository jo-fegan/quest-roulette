<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { brand: '#6c5ce7' } }, fontFamily: { sans: ['Poppins'] } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Load Supabase Library FIRST -->   
	<!-- <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script> -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.45.0/supabase.min.js"></script>
	
    <!-- Load Admin Logic SECOND (attaches functions to window) -->
    <script src="admin.js" defer></script>
    
    <!-- Your inline logic runs AFTER everything is loaded -->
</head>
<body class="bg-slate-50 min-h-screen font-sans" >

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-brand">Quest Manager</h1>
            <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700 font-medium">Log Out</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Controls Bar -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex-grow max-w-md">
                <input type="text" id="searchInput" placeholder="Search titles, areas..." 
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand outline-none"
                       oninput="renderTable()">
            </div>
            <div class="flex gap-2">
                <button onclick="openBulkEditModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    ✏️ Bulk Edit Selected
                </button>
                <button onclick="refreshData()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-100 text-slate-600 text-xs uppercase font-semibold">
                    <tr>
                        <th class="px-4 py-3 w-10"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                        <th class="px-4 py-3">Title</th>
                        <th class="px-4 py-3">Area</th>
                        <th class="px-4 py-3">Price</th>
                        <th class="px-4 py-3">Details</th>
                        <th class="px-4 py-3 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="activityTableBody" class="divide-y divide-slate-100 text-sm">
                    <!-- Rows injected by JS -->
                    <tr><td colspan="6" class="px-4 py-8 text-center text-slate-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Edit Modal (Single & Bulk) -->
    <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 m-4">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 text-slate-800">Edit Activity</h2>
            <div id="modalContent" class="space-y-4">
                <!-- Dynamic Form Fields -->
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">Cancel</button>
                <button onclick="saveChanges()" id="saveBtn" class="px-4 py-2 bg-brand text-white rounded-lg hover:bg-indigo-700">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 m-4 text-center">
            <h2 class="text-xl font-bold mb-2 text-red-600">Delete Activity?</h2>
            <p class="text-slate-600 mb-6">This action cannot be undone.</p>
            <div class="flex justify-center gap-4">
                <button onclick="document.getElementById('deleteModal').classList.add('hidden')" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">Cancel</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Yes, Delete</button>
            </div>
        </div>
    </div>

    <script>
        // Global State
        let allActivities = [];
        let selectedIds = new Set();
        let currentEditId = null;
        let pendingDeleteId = null;
        let isBulkMode = false;

        // Init
        async function init() {
            await refreshData();
        }
        
        async function refreshData() {
            try {
                allActivities = await window.fetchAllActivities();
                renderTable();
            } catch (err) {
                alert("Error loading data: " + err.message);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('activityTableBody');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allActivities.filter(act => 
                act.title.toLowerCase().includes(searchTerm) || 
                (act.area && act.area.toLowerCase().includes(searchTerm))
            );

            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-slate-500">No activities found.</td></tr>`;
                return;
            }

            filtered.forEach(act => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="px-4 py-3 text-center">
                        <input type="checkbox" value="${act.dbId}" 
                               ${selectedIds.has(act.dbId) ? 'checked' : ''}
                               onchange="toggleSelection(${act.dbId})"
                               class="w-4 h-4 text-brand border-slate-300 rounded focus:ring-brand">
                    </td>
                    <td class="px-4 py-3 font-medium text-slate-800">${act.title}</td>
                    <td class="px-4 py-3"><span class="bg-slate-100 text-slate-700 px-2 py-1 rounded text-xs">${act.area || 'Unknown'}</span></td>
                    <td class="px-4 py-3">${act.price || '-'}</td>
                    <td class="px-4 py-3 text-slate-500 truncate max-w-xs">${act.description}</td>
                    <td class="px-4 py-3 text-right">
                        <button onclick='openEditModal(${JSON.stringify(act)})' class="text-blue-600 hover:text-blue-800 mr-2">Edit</button>
                        <button onclick="confirmDelete(${act.dbId})" class="text-red-600 hover:text-red-800">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Selection Logic
        function toggleSelection(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            // Update select all checkbox state
            const selectAll = document.getElementById('selectAll');
            selectAll.checked = allActivities.every(a => selectedIds.has(a.dbId));
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            if (checked) {
                allActivities.forEach(a => selectedIds.add(a.dbId));
            } else {
                selectedIds.clear();
            }
            renderTable();
        }

        // Modal Logic
        function openEditModal(activity) {
            currentEditId = activity.dbId;
            isBulkMode = false;
            const modal = document.getElementById('editModal');
            const content = document.getElementById('modalContent');
            document.getElementById('modalTitle').innerText = `Edit: ${activity.title}`;
            
            // Generate fields based on available keys in the activity
            const fields = ['title', 'description', 'price', 'distance', 'duration', 'area', 'kidsFriendly', 'romantic', 'weatherSuitable'];
            
            content.innerHTML = fields.map(field => {
                let val = activity[field];
                // Handle boolean and arrays for display
                if (typeof val === 'boolean') {
                    return `
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1 capitalize">${field.replace(/([A-Z])/g, ' $1')}</label>
                        <select class="w-full px-3 py-2 border rounded-lg" name="${field}">
                            <option value="true" ${val ? 'selected' : ''}>True</option>
                            <option value="false" ${!val ? 'selected' : ''}>False</option>
                        </select>
                    </div>`;
                } else if (Array.isArray(val)) {
                    return `
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1 capitalize">${field.replace(/([AZ])/g, ' $1')}</label>
                        <textarea class="w-full px-3 py-2 border rounded-lg" name="${field}" rows="2">${val.join(', ')}</textarea>
                        <p class="text-xs text-slate-400 mt-1">Comma separated values</p>
                    </div>`;
                } else {
                    return `
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1 capitalize">${field.replace(/([A-Z])/g, ' $1')}</label>
                        <input type="text" name="${field}" value="${val || ''}" class="w-full px-3 py-2 border rounded-lg">
                    </div>`;
                }
            }).join('');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function openBulkEditModal() {
            if (selectedIds.size === 0) {
                alert("Please select at least one activity first.");
                return;
            }
            isBulkMode = true;
            currentEditId = null; // Not used in bulk mode
            
            const modal = document.getElementById('editModal');
            const content = document.getElementById('modalContent');
            document.getElementById('modalTitle').innerText = `Bulk Edit (${selectedIds.size} items)`;

            // Only show simple fields for bulk edit
            content.innerHTML = `
                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4">
                    <p class="text-sm text-yellow-800">⚠️ This will update <strong>${selectedIds.size}</strong> items with the same value.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Field to Update</label>
                    <select id="bulkField" class="w-full px-3 py-2 border rounded-lg">
                        <option value="price">Price</option>
                        <option value="area">Area</option>
                        <option value="distance">Distance</option>
                        <option value="duration">Duration</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">New Value</label>
                    <input type="text" id="bulkValue" class="w-full px-3 py-2 border rounded-lg" placeholder="e.g. $$">
                </div>
            `;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        async function saveChanges() {
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            try {
                if (isBulkMode) {
                    const field = document.getElementById('bulkField').value;
                    let value = document.getElementById('bulkValue').value;
                    
                    // Parse boolean if needed
                    if (field === 'kidsFriendly' || field === 'romantic') {
                        value = value === 'true';
                    }
                    // Parse array if needed (comma separated string)
                    if (field === 'weatherSuitable') {
                        value = value.split(',').map(s => s.trim()).filter(s => s);
                    }

                    await window.bulkUpdateActivityIds(Array.from(selectedIds), field, value);
                    alert(`Successfully updated ${selectedIds.size} items!`);
                    selectedIds.clear();
                } else {
                    const formData = new FormData(document.getElementById('modalContent'));
                    const updates = {};
                    
                    // Process form data
                    for (let [key, val] of formData.entries()) {
                        // Convert booleans
                        if (key === 'kidsFriendly' || key === 'romantic') {
                            updates[key] = val === 'true';
                        } else if (key === 'weatherSuitable') {
                            updates[key] = val.split(',').map(s => s.trim()).filter(s => s);
                        } else {
                            updates[key] = val;
                        }
                    }

                    await window.updateActivity(currentEditId, updates);
                    alert("Activity updated!");
                }
                
                closeModal();
                await refreshData();

            } catch (err) {
                alert("Error saving: " + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Save Changes";
            }
        }

        function confirmDelete(id) {
            pendingDeleteId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.getElementById('deleteModal').classList.add('flex');
        }

        document.getElementById('confirmDeleteBtn').onclick = async () => {
            if (!pendingDeleteId) return;
            try {
                await window.deleteActivity(pendingDeleteId);
                alert("Deleted successfully.");
                document.getElementById('deleteModal').classList.add('hidden');
                document.getElementById('deleteModal').classList.remove('flex');
                await refreshData();
            } catch (err) {
                alert("Error deleting: " + err.message);
            }
        };

        // --- INITIALIZATION LOGIC ---
        
        async function init() {
            console.log("Initializing Dashboard...");
            
            // 1. Check Auth First
            if (typeof window.requireAuth !== 'function') {
                console.error("CRITICAL: requireAuth function not found on window. Check admin.js loading.");
                alert("System Error: Authentication module failed to load.");
                return;
            }

            // If not logged in, this will redirect and stop execution here
            await window.requireAuth(); 
            
            // If we are still here, auth passed. Now load data.
            console.log("Auth passed. Loading data...");
            await refreshData();
        }

        // Start the app when the DOM is ready
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
